<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="f1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>
  </defs>
  <!-- Background Glow -->
  <circle cx="64" cy="64" r="40" fill="url(#g1)" opacity="0.4" filter="url(#f1)" />
  <!-- Planet Body -->
  <circle cx="64" cy="64" r="32" fill="url(#g1)" />
  <!-- Surface Detail -->
  <path d="M40 50 Q64 40 88 50" stroke="white" stroke-width="0.5" fill="none" opacity="0.3" />
  <path d="M35 64 Q64 54 93 64" stroke="white" stroke-width="0.5" fill="none" opacity="0.2" />
  <!-- Ring -->
  <ellipse cx="64" cy="64" rx="55" ry="10" fill="none" stroke="white" stroke-width="3" transform="rotate(-30 64 64)" stroke-linecap="round" />
  <ellipse cx="64" cy="64" rx="55" ry="10" fill="none" stroke="#22d3ee" stroke-width="1" transform="rotate(-30 64 64)" stroke-dasharray="2 4" />
  <!-- Shine -->
  <circle cx="50" cy="50" r="8" fill="white" opacity="0.2" />
  <!-- Small Stars -->
  <circle cx="20" cy="30" r="1.5" fill="white" />
  <circle cx="108" cy="40" r="1.2" fill="white" />
  <circle cx="95" cy="100" r="1" fill="white" />
  <circle cx="30" cy="95" r="1.3" fill="white" />
</svg>
